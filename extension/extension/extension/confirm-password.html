<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Confirmation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 400px;
            min-height: 250px;
            background: linear-gradient(135deg, #0a0c10 0%, #0f1219 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #e6e9f0;
        }
        
        .container {
            padding: 24px;
        }
        
        h3 {
            font-size: 20px;
            margin-bottom: 12px;
            text-align: center;
            color: #00ff9d;
        }
        
        .description {
            text-align: center;
            color: #8b92a8;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .input-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(139, 146, 168, 0.3);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 14px;
            color: #e6e9f0;
            margin-bottom: 20px;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #00ff9d;
            box-shadow: 0 0 0 2px rgba(0, 255, 157, 0.2);
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
        }
        
        .btn-secondary {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 12px;
            padding: 12px;
            color: #e6e9f0;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background: rgba(0, 255, 157, 0.1);
            border-color: #00ff9d;
        }
        
        .btn-primary {
            flex: 1;
            background: linear-gradient(135deg, #00ff9d 0%, #00cc7d 100%);
            border: none;
            border-radius: 12px;
            padding: 12px;
            color: #0a0c10;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 255, 157, 0.3);
        }
        
        .error-message {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            color: #ff8a92;
            font-size: 12px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h3>🔐 Confirmation requise</h3>
        <p class="description">
            Pour ajouter un nouveau compte, veuillez confirmer votre mot de passe.
        </p>
        
        <div id="errorMsg" class="error-message"></div>
        
        <input type="password" id="password" class="input-field" placeholder="Mot de passe" autofocus>
        
        <div class="modal-actions">
            <button id="cancelBtn" class="btn-secondary">Annuler</button>
            <button id="confirmBtn" class="btn-primary">Confirmer</button>
        </div>
    </div>
    
    <script src="confirm-password.js"></script>
</body>
</html>
